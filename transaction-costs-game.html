<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Make-or-Buy Decision | ODCE</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --turquoise: #00C1D4;
      --blue: #143AFF;
      --violet: #7200FE;
      --mint: #5AFFC5;
      --red: #FF4F4F;
      --orange: #FF7E15;
      --yellow: #FFDE36;
      --cool-gray: #D0D0CE;
      --black: #000000;
      --white: #FFFFFF;
      --bg: #F0F9FA;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px 56px;
    }

    #app { width: 100%; max-width: 660px; }

    /* ── LOGO ── */
    .logo-wrap {
      margin-bottom: 22px;
    }
    .logo-wrap svg {
      height: 44px;
      width: auto;
      display: block;
    }
    /* strip the Inkscape transform so the logo renders at its natural viewBox */
    .logo-wrap svg g { transform: none !important; }

    /* ── CARD ── */
    .card {
      background: var(--white);
      padding: 38px 44px 44px;
      position: relative;
      overflow: hidden;
      border-top: 5px solid var(--turquoise);
      box-shadow: 0 4px 28px rgba(0,193,212,0.10), 0 1px 4px rgba(0,0,0,0.05);
    }

    /* ── CIRCUIT DECO ── */
    .circuit-deco {
      position: absolute;
      top: 0; right: 0;
      width: 200px; height: 170px;
      pointer-events: none;
      opacity: 0.055;
    }

    /* ── ACCENT ── */
    .accent-line {
      height: 3px;
      background: linear-gradient(90deg, var(--turquoise) 55%, transparent);
      margin-bottom: 28px;
    }
    .divider { height: 1px; background: var(--cool-gray); margin: 24px 0; }

    /* ── PROGRESS ── */
    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px;
    }
    .progress-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--turquoise);
    }
    .progress-score {
      font-size: 10px; font-weight: 700;
      letter-spacing: 1px; color: var(--blue);
    }
    .progress-track { height: 3px; background: var(--cool-gray); margin-bottom: 28px; }
    .progress-fill  { height: 100%; background: var(--turquoise); transition: width 0.4s ease; }

    /* ── TYPE ── */
    h1 { font-size: 30px; font-weight: 700; color: var(--black); line-height: 1.15; margin-bottom: 10px; letter-spacing: -0.3px; }
    h2 { font-size: 21px; font-weight: 700; color: var(--black); line-height: 1.25; margin-bottom: 14px; }
    .subtitle { font-size: 14px; color: #444; line-height: 1.75; margin-bottom: 28px; }
    .tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--turquoise); margin-bottom: 6px; }

    /* ── CHIPS ── */
    .chips { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
    .chip { background: var(--bg); border: 1.5px solid var(--cool-gray); padding: 6px 14px; font-size: 12px; font-weight: 600; color: #555; }
    .chip strong { color: var(--blue); }

    /* ── SCENARIO ── */
    .scenario-box {
      background: var(--bg);
      border-left: 4px solid var(--turquoise);
      padding: 16px 20px;
      font-size: 14px; color: #333; line-height: 1.75;
      margin-bottom: 24px;
    }
    .scenario-box::before {
      content: 'SCENARIO';
      display: block;
      font-size: 9px; font-weight: 700;
      letter-spacing: 2.5px; color: var(--turquoise);
      margin-bottom: 6px;
    }

    .question-prompt { font-size: 15px; font-weight: 700; color: var(--black); margin-bottom: 16px; }

    /* ── OPTIONS ── */
    .options { display: flex; flex-direction: column; gap: 10px; }

    .option-btn {
      border: 2px solid var(--cool-gray);
      background: var(--white);
      padding: 15px 18px;
      font-family: 'Poppins', sans-serif;
      font-size: 13.5px; font-weight: 500; color: #222;
      cursor: pointer; text-align: left;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      line-height: 1.55;
      display: flex; align-items: flex-start; gap: 14px;
    }
    .option-btn:hover:not(:disabled) { border-color: var(--turquoise); background: #f0fdfe; transform: translateX(3px); }

    .option-letter {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; min-width: 28px;
      border: 2px solid var(--cool-gray);
      font-size: 12px; font-weight: 700; color: #666;
      transition: all 0.15s; margin-top: 1px; flex-shrink: 0;
    }
    .option-btn:hover:not(:disabled) .option-letter { border-color: var(--turquoise); color: var(--turquoise); }

    .option-btn.correct { border-color: var(--mint); background: #edfff8; }
    .option-btn.correct .option-letter { background: var(--mint); border-color: var(--mint); color: #005a44; }
    .option-btn.partial { border-color: var(--yellow); background: #fffce6; }
    .option-btn.partial .option-letter { background: var(--yellow); border-color: var(--yellow); color: #6b4e00; }
    .option-btn.wrong   { border-color: var(--red); background: #fff2f2; }
    .option-btn.wrong .option-letter   { background: var(--red); border-color: var(--red); color: var(--white); }
    .option-btn.dimmed  { opacity: 0.38; }
    .option-btn:disabled { cursor: default; transform: none !important; }

    /* ── FEEDBACK ── */
    .feedback-panel { margin-top: 20px; padding: 16px 20px; border-left: 4px solid var(--turquoise); background: var(--bg); display: none; }
    .feedback-panel.visible { display: block; }
    .feedback-panel.correct { border-color: var(--mint); }
    .feedback-panel.partial { border-color: var(--yellow); }
    .feedback-panel.wrong   { border-color: var(--red); }
    .feedback-pts { font-size: 15px; font-weight: 700; margin-bottom: 5px; }
    .feedback-panel.correct .feedback-pts { color: #00704a; }
    .feedback-panel.partial .feedback-pts { color: #7a5e00; }
    .feedback-panel.wrong   .feedback-pts { color: #a00; }
    .feedback-text { font-size: 13px; color: #444; line-height: 1.7; }

    /* ── BUTTONS ── */
    .btn-primary {
      display: block; width: 100%; margin-top: 22px;
      background: var(--turquoise); color: var(--white); border: none;
      padding: 16px 28px;
      font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px;
      transition: background 0.15s, transform 0.1s; text-align: center;
    }
    .btn-primary:hover { background: #009fb0; transform: translateY(-1px); }
    .btn-outline {
      display: block; width: 100%; margin-top: 10px;
      background: transparent; color: var(--blue);
      border: 2px solid var(--blue);
      padding: 14px 28px;
      font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px;
      transition: all 0.15s; text-align: center;
    }
    .btn-outline:hover { background: var(--blue); color: var(--white); }

    /* ── INPUT ── */
    .field-label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #555; margin-bottom: 6px; margin-top: 24px; }
    .input-field { width: 100%; border: 2px solid var(--cool-gray); background: var(--white); padding: 14px 16px; font-family: 'Poppins', sans-serif; font-size: 14px; outline: none; transition: border-color 0.15s; }
    .input-field:focus { border-color: var(--turquoise); }

    /* ── RESULTS ── */
    .score-display { text-align: center; padding: 28px 0 20px; border-bottom: 1px solid var(--cool-gray); margin-bottom: 24px; }
    .score-number { font-size: 72px; font-weight: 700; color: var(--blue); line-height: 1; }
    .score-denom  { font-size: 24px; font-weight: 300; color: var(--cool-gray); }
    .score-pts-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #888; text-transform: uppercase; margin-top: 4px; }

    .tier-row { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-left: 5px solid var(--turquoise); background: var(--bg); margin-bottom: 24px; }
    .tier-row.expert       { border-color: var(--mint); }
    .tier-row.practitioner { border-color: var(--yellow); }
    .tier-row.apprentice   { border-color: var(--red); }
    .tier-icon { font-size: 26px; line-height: 1; }
    .tier-name { font-size: 15px; font-weight: 700; color: var(--black); }
    .tier-desc { font-size: 13px; color: #555; margin-top: 2px; }

    .breakdown-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 13px; }
    .breakdown-pts { font-weight: 700; color: var(--blue); }

    /* ── LEADERBOARD ── */
    .lb-item { display: flex; align-items: center; padding: 12px 16px; border-left: 4px solid transparent; margin-bottom: 6px; background: var(--bg); font-size: 14px; }
    .lb-item.gold   { border-color: var(--yellow); background: #fffce6; }
    .lb-item.silver { border-color: var(--cool-gray); }
    .lb-item.bronze { border-color: var(--orange); background: #fff5ed; }
    .lb-item.me     { border-color: var(--turquoise); background: #f0fdfe; }
    .lb-rank  { width: 32px; font-weight: 700; color: #888; flex-shrink: 0; }
    .lb-name  { flex: 1; font-weight: 600; }
    .lb-score { font-weight: 700; color: var(--blue); }
    .lb-empty { color: #aaa; font-size: 13px; padding: 20px 0; text-align: center; }

    /* ── HOST ── */
    .host-banner { background: var(--blue); color: var(--white); padding: 20px 24px; margin-bottom: 24px; }
    .host-banner h2 { color: var(--white); font-size: 18px; }
    .host-banner p  { font-size: 12px; opacity: 0.7; margin-top: 4px; letter-spacing: 0.5px; }
    .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
    .stat-box { background: var(--white); border-top: 3px solid var(--turquoise); padding: 14px 12px; text-align: center; }
    .stat-val   { font-size: 28px; font-weight: 700; color: var(--blue); }
    .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #888; margin-top: 2px; }
    .host-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
    .host-btn { background: var(--bg); border: 2px solid var(--cool-gray); padding: 10px 14px; font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; color: #333; transition: all 0.15s; text-align: center; }
    .host-btn:hover { background: var(--turquoise); color: var(--white); border-color: var(--turquoise); }
    .host-btn.danger:hover { background: var(--red); border-color: var(--red); color: var(--white); }
    .section-label { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--turquoise); margin-bottom: 12px; }

    @media (max-width: 480px) {
      .card { padding: 24px 20px 28px; }
      h1 { font-size: 24px; }
      .score-number { font-size: 56px; }
    }
  </style>
</head>
<body>
<div id="app"></div>

const GAME = {

const MAX_SCORE = 12;
const KEY = "odce_tct_v1";

let S = { screen:"welcome", nickname:"", qi:0, score:0, answers:[], sel:null, revealed:false };

function isHost() { return new URLSearchParams(window.location.search).has("host"); }
function getScores() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } }
function saveScore(n, s) {
  const a = getScores(); a.push({nickname:n,score:s,ts:Date.now()});
  a.sort((x,y)=>y.score-x.score);
  localStorage.setItem(KEY, JSON.stringify(a));
}
function clearScores() { localStorage.removeItem(KEY); }

    <line x1="95" y1="28" x2="145" y2="28" stroke="#000" stroke-width="2"/>
    <rect x="87" y="73" width="16" height="16" stroke="#000" stroke-width="2" fill="none"/>
    <line x1="172" y1="95" x2="172" y2="148" stroke="#000" stroke-width="2"/>

    <line x1="120" y1="100" x2="165" y2="100" stroke="#000" stroke-width="1.5" stroke-dasharray="3 3"/>

  </svg>`;
}

// Logo wrapper — solid for formal screens, scribble for welcome
function logoWrap(variant) {
  const svg = variant === 'scribble' ? LOGO_SCRIBBLE : LOGO_SOLID;
  return `<div class="logo-wrap">${svg}</div>`;
}

function render() {
  const app = document.getElementById("app");
  if (isHost()) { app.innerHTML = hostHTML(); bindHost(); return; }
  if      (S.screen==="welcome")  { app.innerHTML = welcomeHTML();  bindWelcome(); }
  else if (S.screen==="question") { app.innerHTML = questionHTML(); bindQuestion(); }
  else if (S.screen==="results")  { app.innerHTML = resultsHTML();  bindResults(); }
  else if (S.screen==="lb")       { app.innerHTML = lbHTML();       bindLb(); }
}

// ── WELCOME ───────────────────────────────────────────────────────────────────
function welcomeHTML() {
  return `<div class="card">
    ${circuitDeco()}
    ${logoWrap('scribble')}
    <div class="accent-line"></div>
    <div class="tag">Transaction Cost Theory · Interactive Case</div>
    <h1>${GAME.title}</h1>
    <p class="subtitle">${GAME.intro}</p>
    <div class="chips">
      <div class="chip"><strong>4</strong> decisions</div>
      <div class="chip">Max <strong>${MAX_SCORE}</strong> pts</div>
      <div class="chip">~<strong>7</strong> min</div>
    </div>
    <div class="divider"></div>
    <label class="field-label" for="nick">Your name</label>
    <input class="input-field" id="nick" type="text" placeholder="Shown on the leaderboard" maxlength="30" autocomplete="off"/>
    <button class="btn-primary" id="start-btn">Start Challenge →</button>
  </div>`;
}
function bindWelcome() {
  const inp = document.getElementById("nick");
  const btn = document.getElementById("start-btn");
  function go() {
    const v = inp.value.trim();
    if (!v) { inp.style.borderColor = "var(--red)"; inp.focus(); return; }
    S = { screen:"question", nickname:v, qi:0, score:0, answers:[], sel:null, revealed:false };
    render();
  }
  inp.addEventListener("keydown", e => { if(e.key==="Enter") go(); });
  btn.addEventListener("click", go);
}

// ── QUESTION ──────────────────────────────────────────────────────────────────
function questionHTML() {
  const q = GAME.questions[S.qi];
  const pct = (S.qi / GAME.questions.length) * 100;
  const opts = q.options.map((opt, i) => {
    let cls = "";
    if (S.revealed) {
      if (i===S.sel)         cls = opt.points===3?"correct":opt.points===1?"partial":"wrong";
      else if (opt.points===3) cls = "correct";
      else                   cls = "dimmed";
    }
    return `<button class="option-btn ${cls}" data-i="${i}" ${S.revealed?"disabled":""}>
      <span class="option-letter">${opt.letter}</span>
      <span>${opt.text}</span>
    </button>`;
  }).join("");

  let fb = "";
  if (S.revealed && S.sel!==null) {
    const f = q.feedback[S.sel];
    fb = `<div class="feedback-panel visible ${f.type}">
      <div class="feedback-pts">${f.pts}</div>
      <div class="feedback-text">${f.text}</div>
    </div>`;
  }
  const isLast = S.qi===GAME.questions.length-1;
  const nxt = S.revealed
    ? `<button class="btn-primary" id="next-btn">${isLast?"See My Results →":"Next Decision →"}</button>` : "";

  return `<div class="card">
    ${circuitDeco()}
    ${logoWrap('solid')}
    <div class="progress-meta">
      <span class="progress-label">Decision ${S.qi+1} of ${GAME.questions.length}</span>
      <span class="progress-score">${S.score} pts</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="tag">Case</div>
    <h2>${q.title}</h2>
    <div class="scenario-box">${q.scenario}</div>
    <div class="question-prompt">${q.question}</div>
    <div class="options">${opts}</div>
    ${fb}
    ${nxt}
  </div>`;
}
function bindQuestion() {
  document.querySelectorAll(".option-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if (S.revealed) return;
      S.sel = parseInt(btn.dataset.i);
      S.score += GAME.questions[S.qi].options[S.sel].points;
      S.answers.push({ qi:S.qi, si:S.sel, pts:GAME.questions[S.qi].options[S.sel].points });
      S.revealed = true;
      render();
    });
  });
  const nb = document.getElementById("next-btn");
  if (nb) nb.addEventListener("click", () => {
    S.qi++; S.sel=null; S.revealed=false;
    if (S.qi>=GAME.questions.length) S.screen="results";
    render();
  });
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
function resultsHTML() {
  const tier = GAME.tiers.find(t=>S.score>=t.min);
  const bk = S.answers.map((a,i) => {
    const q = GAME.questions[i];
    const ico = a.pts===3?"✓":a.pts===1?"~":"✗";
    const col = a.pts===3?"var(--mint)":a.pts===1?"var(--yellow)":"var(--red)";
    return `<div class="breakdown-row">
      <span><span style="color:${col};font-weight:700;margin-right:8px;">${ico}</span>${q.title}</span>
      <span class="breakdown-pts">${a.pts} / 3</span>
    </div>`;
  }).join("");
  return `<div class="card">
    ${circuitDeco()}
    ${logoWrap('solid')}
    <div class="accent-line"></div>
    <div class="tag">Your result, ${S.nickname}</div>
    <div class="score-display">
      <div class="score-number">${S.score}<span class="score-denom"> /${MAX_SCORE}</span></div>
      <div class="score-pts-label">points</div>
    </div>
    <div class="tier-row ${tier.cls}">
      <div class="tier-icon" style="color:${tier.cls==='expert'?'var(--mint)':tier.cls==='practitioner'?'var(--yellow)':'var(--red)'}">${tier.icon}</div>
      <div><div class="tier-name">${tier.label}</div><div class="tier-desc">${tier.desc}</div></div>
    </div>
    <div class="section-label">Decision Breakdown</div>
    ${bk}
    <button class="btn-primary" id="submit-btn">Submit to Leaderboard →</button>
    <button class="btn-outline"  id="view-lb-btn">View Leaderboard</button>
  </div>`;
}
function bindResults() {
  let done=false;
  document.getElementById("submit-btn").addEventListener("click",()=>{
    if(!done){saveScore(S.nickname,S.score);done=true;}
    S.screen="lb";render();
  });
  document.getElementById("view-lb-btn").addEventListener("click",()=>{S.screen="lb";render();});
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
function lbHTML() {
  const all=getScores();
  const myIdx=all.findIndex(s=>s.nickname===S.nickname&&s.score===S.score);
  const clsMap=["gold","silver","bronze"], medals=["🥇","🥈","🥉"];
  const rows=all.slice(0,10).map((s,i)=>{
    const isMe=i===myIdx;
    return `<div class="lb-item ${i<3?clsMap[i]:""} ${isMe?"me":""}">
      <div class="lb-rank">${i<3?medals[i]:`${i+1}.`}</div>
      <div class="lb-name">${s.nickname}${isMe?` <span style="font-size:11px;color:var(--turquoise);"> ← you</span>`:""}</div>
      <div class="lb-score">${s.score} pts</div>
    </div>`;
  }).join("")||`<div class="lb-empty">No entries yet.</div>`;
  return `<div class="card">
    ${logoWrap('solid')}
    <div class="accent-line"></div>
    <div class="tag">Leaderboard</div>
    <h2>Top Results</h2>
    ${rows}
    <button class="btn-primary" id="again-btn">Play Again →</button>
  </div>`;
}
function bindLb() {
  document.getElementById("again-btn").addEventListener("click",()=>{
    S={screen:"welcome",nickname:"",qi:0,score:0,answers:[],sel:null,revealed:false};render();
  });
}

// ── HOST ──────────────────────────────────────────────────────────────────────
function hostHTML() {
  const all=getScores(), n=all.length;
  const avg=n?(all.reduce((s,r)=>s+r.score,0)/n).toFixed(1):"—";
  const top=n?all[0].score:"—";
  const clsMap=["gold","silver","bronze"],medals=["🥇","🥈","🥉"];
  const rows=all.slice(0,20).map((s,i)=>{
    const t=new Date(s.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    return `<div class="lb-item ${i<3?clsMap[i]:""}">
      <div class="lb-rank">${i<3?medals[i]:`${i+1}.`}</div>
      <div class="lb-name">${s.nickname}</div>
      <div style="font-size:11px;color:#aaa;margin-right:12px;">${t}</div>
      <div class="lb-score">${s.score} pts</div>
    </div>`;
  }).join("")||`<div class="lb-empty">No students have submitted yet.</div>`;
  return `<div class="card">
    ${logoWrap('solid')}
    <div class="host-banner"><h2>Host Control Panel</h2><p>The Make-or-Buy Decision · Transaction Cost Theory</p></div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-val">${n}</div><div class="stat-label">Done</div></div>
      <div class="stat-box"><div class="stat-val">${avg}</div><div class="stat-label">Avg pts</div></div>
      <div class="stat-box"><div class="stat-val">${top}</div><div class="stat-label">Top score</div></div>
    </div>
    <div class="host-actions">
      <button class="host-btn" id="h-copy">📋 Copy student link</button>
      <button class="host-btn" id="h-export">⬇ Export CSV</button>
      <button class="host-btn" id="h-refresh">↺ Refresh</button>
      <button class="host-btn danger" id="h-reset">✕ Reset scores</button>
    </div>
    <div class="section-label">Leaderboard</div>
    ${rows}
  </div>`;
}
function bindHost() {
  document.getElementById("h-copy").addEventListener("click",()=>{
    const url=window.location.href.replace(/[?&]host(=true)?/,"").replace(/\?$/,"");
    navigator.clipboard.writeText(url).then(()=>{
      const b=document.getElementById("h-copy");b.textContent="✓ Copied!";
      setTimeout(()=>{b.textContent="📋 Copy student link";},2000);
    });
  });
  document.getElementById("h-export").addEventListener("click",()=>{
    const rows=getScores();
    const csv=["Rank,Name,Score,Time",...rows.map((s,i)=>
      `${i+1},"${s.nickname.replace(/"/g,'""')}",${s.score},"${new Date(s.ts).toLocaleString()}"`)].join("\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    a.download="tct-scores.csv";a.click();
  });
  document.getElementById("h-refresh").addEventListener("click",render);
  document.getElementById("h-reset").addEventListener("click",()=>{
    if(confirm("Clear all scores? This cannot be undone.")){clearScores();render();}
  });
}

render();
</script>
